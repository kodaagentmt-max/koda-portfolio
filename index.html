<!doctype html>
<html lang="en">

<title>Koda Portfolio — Gaming Thumbnails</title>
<style>
  body { background: #0d0d0d; color: #f0f0f0; font: 16px/1.5 system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 40px 20px; }
  h1 { font-size: 28px; margin-bottom: 30px; color: #fff; }
  h2 { font-size: 18px; margin: 30px 0 15px; color: #fff; border-bottom: 1px solid #333; padding-bottom: 8px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
  .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .card-name { padding: 12px 16px; font-size: 14px; color: #aaa; }
  a { text-decoration: none; }
</style>
</head>
